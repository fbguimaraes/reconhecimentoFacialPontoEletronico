name: ponto_flutter
description: App Android para registro de ponto com reconhecimento facial.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.1.0
  camera: ^0.10.5
  google_mlkit_face_detection: ^0.9.0
  image: ^4.0.17
  permission_handler: ^11.0.0
  shared_preferences: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true
